spring.application.name=backend

# MongoDB
# Uses MONGODB_URI when provided; otherwise falls back to local Mongo.
# Spring Boot 4 key:
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cse416}
# Compatibility key for older Spring Data property name:
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cse416}


# Gzip compression for large JSON responses (Gingles ~500KB, heatmap ~128KB)
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain
server.compression.min-response-size=1024

# Spring Cache — Caffeine in-memory cache
spring.cache.type=caffeine
# maximumSize=500 entries; expireAfterWrite=24h (data is static; evict only on restart)
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=86400s

# ── DataLoader flags ──────────────────────────────────────────────────────────
# Set app.load-data=true ONCE to seed MongoDB, then flip back to false.
# Working directory assumed to be backend/ when running ./mvnw spring-boot:run
app.load-data=true
# splash-states.json only — still in frontend/src/dummy
app.splash-data.base-path=../frontend/src/dummy
app.seawulf.base-path=../seawulf_runs
# Root containing AL-real-data/, OR-real-data/, AL_data/, OR_data/ subdirectories
app.geodata.base-path=..

# Census block GeoJSON files (served via bbox-filtered API, never fully sent to client)
app.census.al-file=../frontend/src/assets/ALCensusMap.json
app.census.or-file=../frontend/src/assets/ORCensusMap.json
